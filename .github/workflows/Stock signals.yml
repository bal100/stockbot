name: StockBot Daily Signals

on:
  schedule:
    - cron: '30 3 * * 1-5'    # 9:00 AM IST = Indian market
    - cron: '30 12 * * 1-5'   # 6:00 PM IST = US market
  workflow_dispatch:
    inputs:
      market:
        description: 'Market (IN = India, US = America)'
        required: true
        default: 'IN'
        type: choice
        options: [IN, US]

jobs:
  send-stock-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine market
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MARKET=${{ github.event.inputs.market }}" >> $GITHUB_ENV
          elif [ "$(date -u +%H | sed 's/^0//')" -lt 10 ]; then
            echo "MARKET=IN" >> $GITHUB_ENV
          else
            echo "MARKET=US" >> $GITHUB_ENV
          fi

      - name: Run StockBot
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WA_PHONE:         ${{ secrets.WA_PHONE }}
          WA_APIKEY:        ${{ secrets.WA_APIKEY }}
          MARKET:           ${{ env.MARKET }}
        run: python signal_bot.py

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="⚠️ StockBot FAILED (${{ env.MARKET }}) at $(TZ=Asia/Kolkata date '+%d %b %I:%M %p IST'). See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" || true
